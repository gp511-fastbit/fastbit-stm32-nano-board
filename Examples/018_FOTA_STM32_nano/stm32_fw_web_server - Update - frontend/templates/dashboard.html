<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Firmware Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f9;
            margin: 0;
            padding: 20px;
            color: #333;
        }

        h1 {
            color: #333;
            text-align: center;
        }

        #board-status, #upload-section, #download-progress-section {
            background-color: #fff;
            padding: 20px;
            margin: 20px auto;
            max-width: 600px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }

        #board-status h2, #upload-section h2, #download-progress-section h2 {
            color: #0056b3;
            font-weight: normal;
        }

        #upload-section {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        input[type="file"] {
            margin-bottom: 10px;
        }

        button {
            background-color: #0056b3;
            color: white;
            border: none;
            padding: 10px 15px;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #003d7a;
        }

        #upload-result {
            margin-top: 10px;
            color: #28a745;
            font-weight: bold;
        }

        #progress-bars p {
            margin: 10px 0;
            font-size: 14px;
            color: #666;
        }

        progress {
            width: 100%;
            height: 20px;
            border-radius: 10px;
            appearance: none;
        }

        progress::-webkit-progress-bar {
            background-color: #e6e6e6;
            border-radius: 10px;
        }

        progress::-webkit-progress-value {
            background-color: #0056b3;
            border-radius: 10px;
        }

        .status-icon {
            margin-right: 10px;
            font-size: 18px;
            color: #0056b3;
        }
        
        .progress-icon {
            font-size: 18px;
            color: #28a745;
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <h1><i class="fas fa-microchip"></i> Firmware Update Dashboard</h1>

    <div id="board-status">
        <h2><i class="fas fa-wifi status-icon"></i> Board Connection Status</h2>
        <p id="status">Waiting for board to connect...</p>
        <p id="connected-count">Connected Boards: 0</p>
    </div>

    <div id="upload-section">
        <h2><i class="fas fa-upload status-icon"></i> Upload Firmware</h2>
        <input type="file" id="firmware-file" />
        <button onclick="uploadFirmware()"><i class="fas fa-file-upload"></i> Upload Firmware</button>
        <p id="upload-result"></p>
    </div>

    <div id="download-progress-section">
        <h2><i class="fas fa-tasks progress-icon"></i> Download Progress</h2>
        <div id="progress-bars">
            <!-- Progress bars for each board will be added here dynamically -->
        </div>
    </div>

    <script>
        const socket = io();

        // Listen for status updates from the server
        socket.on('status', function (data) {
            document.getElementById('status').textContent = data.message;
            document.getElementById('connected-count').textContent = "Connected Boards: " + data.connected_boards;
        });

        // Listen for download progress updates
        socket.on('download_progress', function (data) {
            const { ip, progress } = data;

            // Create or update a progress bar for the specific board IP
            let progressBar = document.getElementById(`progress-${ip}`);
            if (!progressBar) {
                // Create a new progress bar if it doesn't exist
                progressBar = document.createElement('div');
                progressBar.id = `progress-${ip}`;
                progressBar.innerHTML = `
                    <p><i class="fas fa-hdd progress-icon"></i> Board ${ip}: <span id="progress-label-${ip}">0%</span></p>
                    <progress id="progress-bar-${ip}" value="0" max="100"></progress>
                `;
                document.getElementById('progress-bars').appendChild(progressBar);
            }

            // Update the progress bar and label
            document.getElementById(`progress-bar-${ip}`).value = progress;
            document.getElementById(`progress-label-${ip}`).textContent = `${progress}%`;
        });

        // Upload firmware to the server
        function uploadFirmware() {
            const fileInput = document.getElementById('firmware-file');
            const file = fileInput.files[0];
            const formData = new FormData();
            formData.append('file', file);

            fetch('/api/upload', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('upload-result').textContent = data.success ? data.success : data.error;
            })
            .catch(error => {
                console.error('Error:', error);
                document.getElementById('upload-result').textContent = 'Failed to upload firmware.';
            });
        }
    </script>
</body>
</html>
